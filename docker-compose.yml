services:
  django:
    build: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn aeaios.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media:/app/media
    depends_on:
      - postgres
      - redis
      - qdrant

  celery:
    build: .
    command: celery -A aeaios worker -l info
    env_file: .env.example
    volumes:
      - .:/app
      - media:/app/media
    depends_on:
      - django
      - redis

  inference:
    build: .
    command: uvicorn fastapi_inference.main:app --host 0.0.0.0 --port 9000
    env_file: .env.example
    ports:
      - "9000:9000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aeaios
      POSTGRES_USER: aeaios
      POSTGRES_PASSWORD: aeaios
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n:/home/node/.n8n

volumes:
  postgres:
  redis:
  qdrant:
  n8n:
  media:
